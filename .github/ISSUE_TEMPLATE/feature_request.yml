name: Feature request
description: Suggest a new feature, improvement, or roadmap item.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. "I'm trying to do X but OpenJND currently does Y."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like OpenJND to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are you aware of workarounds or other libraries that solve this?

  - type: checkboxes
    id: willing
    attributes:
      label: Are you willing to help?
      options:
        - label: I'd be willing to open a pull request for this.
        - label: I can help test a proposed implementation.
